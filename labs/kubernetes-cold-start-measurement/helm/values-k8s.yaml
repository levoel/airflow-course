# Helm values для KubernetesExecutor (pod-per-task, cold start).
executor: KubernetesExecutor

images:
  airflow:
    repository: apache/airflow
    tag: 2.10.5-python3.11
    pullPolicy: IfNotPresent  # после prepull-daemonset — будет cache hit

workers:
  # На K8sExecutor "workers" Deployment не нужен, scheduler сам создаёт pods.
  keda:
    enabled: false

scheduler:
  replicas: 1

webserver:
  replicas: 1

postgresql:
  enabled: false
redis:
  enabled: false

data:
  metadataConnection:
    host: host.docker.internal
    user: airflow
    pass: airflow
    db: airflow
    port: 5432
